<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">


<title>Realtime Whiteboard</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    width:100vw;
    height:100vh;

    overflow:hidden;

    background:#222;

}




#toolbar{

    height:70px;

    width:100%;

    display:flex;

    align-items:center;

    justify-content:center;

    gap:10px;


    background:#333;

}




button,
input{


    border:none;

    border-radius:10px;


}



button{


    padding:10px 14px;


    color:white;

    background:#555;


    font-size:15px;


}




button:active{


    transform:scale(0.95);


}




#canvas{


    display:block;


    background:white;


    touch-action:none;


}




</style>


</head>



<body>



<div id="toolbar">


<input
type="color"
id="color"
value="#000000"
>



<input
type="range"
id="size"
min="1"
max="50"
value="5"
>



<button id="eraser">

지우개

</button>



<button id="undo">

↶ 이전

</button>



<button id="redo">

↷ 다음

</button>



<button id="clear">

전체삭제

</button>



</div>



<canvas id="canvas"></canvas>





<script src="script.js"></script>



</body>


</html>
