<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">


<title>Realtime Whiteboard</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}



html,body{

    width:100%;

    height:100%;

    overflow:hidden;

    background:#222;

}





#toolbar{

    height:70px;

    width:100%;


    display:flex;

    align-items:center;

    justify-content:center;


    gap:8px;


    background:#222;

}




#toolbar input[type="color"]{

    width:45px;

    height:40px;

}



#toolbar input[type="range"]{

    width:100px;

}




button{


    height:40px;


    padding:0 14px;


    border:none;


    border-radius:10px;


    background:#444;


    color:white;


    font-size:14px;


}



button:active{

    transform:scale(0.95);

}





canvas{


    display:block;


    background:white;


    touch-action:none;


}



</style>


</head>


<body>



<div id="toolbar">


<input
id="color"
type="color"
value="#000000"
>



<input
id="size"
type="range"
min="1"
max="50"
value="5"
>



<button id="eraser">
지우개
</button>



<button id="undo">
이전
</button>



<button id="redo">
다음
</button>



<button id="clear">
전체삭제
</button>



</div>





<canvas id="canvas"></canvas>




<script src="./script.js"></script>


</body>


</html>
