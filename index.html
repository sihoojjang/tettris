<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Multi Draw</title>


<style>

*{
box-sizing:border-box;
}


body{

margin:0;
overflow:hidden;
background:#202124;

}



#toolbar{

height:80px;

display:flex;

align-items:center;

justify-content:center;

gap:8px;

background:#292929;

}



button,input{

border:none;

border-radius:10px;

}



button{

padding:10px 15px;

background:#444;

color:white;

}



canvas{

display:block;

background:white;

touch-action:none;

}



</style>


</head>



<body>



<div id="toolbar">


<input id="color"
type="color"
value="#000000">


<input id="size"
type="range"
min="1"
max="40"
value="5">



<button id="eraser">
지우개
</button>



<button id="undo">
↶
</button>



<button id="redo">
↷
</button>



<button id="clear">
삭제
</button>


</div>



<canvas id="canvas"></canvas>




<script>


const socket =
new WebSocket(
"wss://tettris-rkjv.onrender.com"
);




// Canvas


const canvas =
document.getElementById("canvas");


const ctx =
canvas.getContext("2d");



let brushColor="#000000";


let brushSize=5;


let eraser=false;



let drawing=false;



let lastX=0;
let lastY=0;



let history=[];

let redoHistory=[];



function resize(){


let image =
canvas.toDataURL();



canvas.width =
window.innerWidth;


canvas.height =
window.innerHeight-80;



let img=new Image();


img.onload=()=>{

ctx.drawImage(
img,
0,
0,
canvas.width,
canvas.height
);

};


img.src=image;


}



resize();


window.addEventListener(
"resize",
resize
);





// 위치 변환


function getPos(e){


let rect =
canvas.getBoundingClientRect();


let x,y;



if(e.touches){

x=e.touches[0].clientX;

y=e.touches[0].clientY;


}

else{

x=e.clientX;

y=e.clientY;


}



return {

x:x-rect.left,

y:y-rect.top

};


}




// 시작


function start(e){


e.preventDefault();


drawing=true;


let p=getPos(e);


lastX=p.x;

lastY=p.y;


history.push([]);


}





// 이동


function move(e){


if(!drawing)

return;



e.preventDefault();


let p=getPos(e);



let data={


x1:lastX/canvas.width,

y1:lastY/canvas.height,


x2:p.x/canvas.width,

y2:p.y/canvas.height,


color:
eraser?
"#ffffff":
brushColor,


size:brushSize


};



draw(data);



history[
history.length-1
].push(data);



send(data);



lastX=p.x;

lastY=p.y;


}





function end(){


drawing=false;


redoHistory=[];


}






canvas.onmousedown=start;

canvas.onmousemove=move;

canvas.onmouseup=end;


canvas.ontouchstart=start;

canvas.ontouchmove=move;

canvas.ontouchend=end;
// =======================
// 그리기 함수
// =======================


function draw(data){


ctx.strokeStyle =
data.color;


ctx.lineWidth =
data.size;


ctx.lineCap =
"round";



ctx.beginPath();


ctx.moveTo(
data.x1 * canvas.width,
data.y1 * canvas.height
);



ctx.lineTo(
data.x2 * canvas.width,
data.y2 * canvas.height
);



ctx.stroke();


}







// =======================
// WebSocket 전송
// =======================


function send(data){


if(
socket.readyState===WebSocket.OPEN
){


socket.send(JSON.stringify({

type:"draw",

data:data

}));


}


}








// =======================
// 상대 그림 받기
// =======================


socket.onmessage=e=>{


let msg =
JSON.parse(e.data);



if(msg.type==="draw"){


draw(
msg.data
);


}



if(msg.type==="clear"){


ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);



history=[];

redoHistory=[];


}



};








// =======================
// 도구
// =======================



document
.getElementById("color")
.onchange=e=>{


brushColor =
e.target.value;


eraser=false;


};





document
.getElementById("size")
.oninput=e=>{


brushSize =
Number(e.target.value);


};







document
.getElementById("eraser")
.onclick=()=>{


eraser=!eraser;


};








// =======================
// Undo
// =======================


document
.getElementById("undo")
.onclick=()=>{


if(history.length===0)

return;



let last =
history.pop();



redoHistory.push(last);



redraw();


};







// =======================
// Redo
// =======================


document
.getElementById("redo")
.onclick=()=>{


if(redoHistory.length===0)

return;



let data =
redoHistory.pop();



history.push(data);



data.forEach(draw);



};








function redraw(){



ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);



history.forEach(
stroke=>{


stroke.forEach(
draw
);


});


}








// =======================
// 전체 삭제
// =======================



document
.getElementById("clear")
.onclick=()=>{


ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);



history=[];

redoHistory=[];



socket.send(JSON.stringify({

type:"clear"

}));


};




</script>


</body>

</html>
