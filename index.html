<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<title>Multi Drawing Board</title>


<style>

body{
    background:#222;
    color:white;
    text-align:center;
    font-family:Arial;
}


canvas{
    background:white;
    border:3px solid black;
    cursor:crosshair;
}


.controls{
    margin:20px;
}


button,input{
    margin:5px;
}

</style>

</head>


<body>


<h1>🌐 Multi Drawing Board</h1>


<p id="status">
서버 연결 중...
</p>



<div class="controls">


색상

<input 
type="color"
id="color"
value="#000000"
>


크기

<input
type="range"
id="size"
min="1"
max="30"
value="5"
>


<button id="eraser">
지우개
</button>


<button id="clear">
전체 지우기
</button>


</div>




<canvas
id="canvas"
width="900"
height="600">
</canvas>





<script>


// ======================
// WebSocket
// ======================


const socket =
new WebSocket(
"wss://https://tettris-rkjv.onrender.com"
);



socket.onopen=()=>{

document.getElementById("status")
.innerText="서버 연결 완료";

};



socket.onerror=()=>{

document.getElementById("status")
.innerText="연결 실패";

};




// ======================
// Canvas
// ======================


const canvas =
document.getElementById("canvas");


const ctx =
canvas.getContext("2d");



let drawing=false;


let color="#000000";


let size=5;


let erase=false;



let lastX=0;
let lastY=0;





document
.getElementById("color")
.onchange=e=>{

color=e.target.value;

erase=false;

};





document
.getElementById("size")
.oninput=e=>{

size=
Number(e.target.value);

};





document
.getElementById("eraser")
.onclick=()=>{

erase=!erase;

};






function getPos(e){

let rect=
canvas.getBoundingClientRect();


return {

x:e.clientX-rect.left,

y:e.clientY-rect.top

};

}







canvas.onmousedown=e=>{


drawing=true;


let pos=getPos(e);



lastX=pos.x;
lastY=pos.y;



ctx.beginPath();

ctx.moveTo(
lastX,
lastY
);



sendDraw({

type:"start",

x:lastX,

y:lastY

});


};







canvas.onmousemove=e=>{


if(!drawing)

return;



let pos=getPos(e);



drawLine(
lastX,
lastY,
pos.x,
pos.y
);



sendDraw({

type:"draw",

x1:lastX,

y1:lastY,

x2:pos.x,

y2:pos.y,

color:
erase?
"#ffffff":
color,

size:size

});



lastX=pos.x;

lastY=pos.y;



};






canvas.onmouseup=()=>{


drawing=false;


ctx.beginPath();


};



canvas.onmouseleave=()=>{


drawing=false;


ctx.beginPath();


};







function drawLine(
x1,
y1,
x2,
y2
){



ctx.strokeStyle=
erase?
"#ffffff":
color;



ctx.lineWidth=size;


ctx.lineCap="round";


ctx.beginPath();



ctx.moveTo(
x1,
y1
);



ctx.lineTo(
x2,
y2
);



ctx.stroke();


}







function sendDraw(data){


if(
socket.readyState===
WebSocket.OPEN
){


socket.send(
JSON.stringify(data)
);


}


}







// ======================
// 상대 그림 받기
// ======================



socket.onmessage=e=>{


let data=
JSON.parse(e.data);




if(data.type==="start"){


ctx.beginPath();


ctx.moveTo(
data.x,
data.y
);


}






if(data.type==="draw"){


ctx.strokeStyle=
data.color;



ctx.lineWidth=
data.size;



ctx.lineCap="round";



ctx.beginPath();



ctx.moveTo(
data.x1,
data.y1
);



ctx.lineTo(
data.x2,
data.y2
);



ctx.stroke();


}







if(data.type==="clear"){


ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);


}



};







// ======================
// 전체 삭제
// ======================



document
.getElementById("clear")
.onclick=()=>{


ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);



sendDraw({

type:"clear"

});


};




</script>


</body>

</html>
