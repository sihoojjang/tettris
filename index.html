<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Realtime Whiteboard</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


html,body{

    width:100%;
    height:100%;

    overflow:hidden;

}


#toolbar{

    height:70px;

    width:100%;

    display:flex;

    align-items:center;

    justify-content:center;

    gap:10px;

    background:#222;

}


button{

    padding:10px 15px;

    border:0;

    border-radius:10px;

    background:#555;

    color:white;

    cursor:pointer;

}


button:hover{

    background:#777;

}


canvas{

    display:block;

    background:white;

    touch-action:none;

}


</style>

</head>


<body>


<div id="toolbar">


<input id="color" type="color" value="#000000">


<input id="size" type="range" min="1" max="50" value="5">


<button id="eraser">
지우개
</button>


<button id="undo">
이전
</button>


<button id="redo">
다음
</button>


<button id="clear">
전체삭제
</button>


</div>



<canvas id="canvas"></canvas>



<script src="./script.js"></script>


</body>


</html>
