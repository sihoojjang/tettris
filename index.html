<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Multi Draw</title>


<style>

*{
box-sizing:border-box;
}


body{

margin:0;
overflow:hidden;
background:#202124;

}



#toolbar{

height:80px;

display:flex;

align-items:center;

justify-content:center;

gap:8px;

background:#292929;

}



button,input{

border:0;

border-radius:12px;

}



button{

padding:10px 15px;

background:#444;

color:white;

font-size:15px;

}



canvas{

display:block;

background:white;

touch-action:none;

}



</style>


</head>



<body>


<div id="toolbar">


<input
type="color"
id="color"
value="#000000"
>


<input
type="range"
id="size"
min="1"
max="40"
value="5"
>


<button id="eraser">
지우개
</button>


<button id="undo">
↶ 이전
</button>


<button id="redo">
↷ 이후
</button>


<button id="clear">
삭제
</button>



</div>



<canvas id="canvas"></canvas>




<script>


// =====================
// WebSocket
// =====================


const socket =
new WebSocket(
"wss://tettris-rkjv.onrender.com"
);





// =====================
// Canvas
// =====================


const canvas=
document.getElementById("canvas");


const ctx=
canvas.getContext("2d");




function resize(){


let old =
canvas.toDataURL();



canvas.width =
window.innerWidth;


canvas.height =
window.innerHeight-80;



if(old !== "data:,"){


let img=new Image();


img.onload=()=>{


ctx.drawImage(
img,
0,
0,
canvas.width,
canvas.height
);


};


img.src=old;


}


}


resize();


window.onresize=resize;






// =====================
// 상태
// =====================



let color="#000000";

let brushSize=5;

let eraser=false;


let drawing=false;


let lastX=0;

let lastY=0;



// 내 기록

let myHistory=[];

let myRedo=[];


// 상대 기록

let remoteHistory=[];






// =====================
// 위치
// =====================


function getPos(e){


let rect =
canvas.getBoundingClientRect();


let x,y;



if(e.touches){

x=e.touches[0].clientX;

y=e.touches[0].clientY;

}

else{

x=e.clientX;

y=e.clientY;

}



return {

x:x-rect.left,

y:y-rect.top

};


}






// =====================
// 입력
// =====================



function start(e){


e.preventDefault();


drawing=true;


let p=getPos(e);


lastX=p.x;

lastY=p.y;


}



function move(e){


if(!drawing)

return;


e.preventDefault();



let p=getPos(e);



let data={


x1:lastX/canvas.width,

y1:lastY/canvas.height,


x2:p.x/canvas.width,

y2:p.y/canvas.height,


color:
eraser?
"#ffffff":
color,


size:Number(brushSize)


};



draw(data);



myHistory.push(data);


myRedo=[];



socket.send(JSON.stringify({

type:"draw",

data:data

}));



lastX=p.x;

lastY=p.y;



}



function end(){


drawing=false;


}





canvas.onmousedown=start;

canvas.onmousemove=move;

canvas.onmouseup=end;


canvas.ontouchstart=start;

canvas.ontouchmove=move;

canvas.ontouchend=end;






// =====================
// 그리기
// =====================



function draw(data){


ctx.strokeStyle=data.color;


ctx.lineWidth=data.size;


ctx.lineCap="round";



ctx.beginPath();


ctx.moveTo(
data.x1*canvas.width,
data.y1*canvas.height
);


ctx.lineTo(
data.x2*canvas.width,
data.y2*canvas.height
);


ctx.stroke();



}






// =====================
// 서버 받기
// =====================



socket.onmessage=e=>{


let msg =
JSON.parse(e.data);





if(msg.type==="init"){


remoteHistory=[];



msg.drawings.forEach(item=>{


remoteHistory.push(
item.data
);


draw(item.data);


});


}






if(msg.type==="draw"){


remoteHistory.push(
msg.data
);


draw(msg.data);


}






if(msg.type==="clear"){


remoteHistory=[];

myHistory=[];

myRedo=[];



ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);


}



};








// =====================
// Undo Redo
// =====================



undo.onclick=()=>{


if(myHistory.length===0)

return;



myRedo.push(
myHistory.pop()
);



redraw();


};






redo.onclick=()=>{


if(myRedo.length===0)

return;



myHistory.push(
myRedo.pop()
);



redraw();


};







function redraw(){


ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);



remoteHistory.forEach(draw);


myHistory.forEach(draw);



}







// =====================
// 도구
// =====================


color.onchange=e=>{


color=e.target.value;

eraser=false;


};



size.oninput=e=>{


brushSize=e.target.value;


};





eraser.onclick=()=>{


eraser=!eraser;


};







clear.onclick=()=>{


socket.send(JSON.stringify({

type:"clear"

}));


};





</script>


</body>

</html>
