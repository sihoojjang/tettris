<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Multi Draw</title>


<style>

*{
    box-sizing:border-box;
}


body{

    margin:0;
    background:#202124;
    color:white;
    overflow:hidden;
    font-family:Arial;

}



#toolbar{

    height:90px;
    background:#292a2d;

    display:flex;
    align-items:center;
    justify-content:center;

    gap:10px;

    flex-wrap:wrap;

}



button,
input{

    border:none;
    border-radius:12px;

}



button{

    padding:10px 16px;

    background:#3c4043;

    color:white;

    font-size:15px;

    cursor:pointer;

}



button:hover{

    background:#5f6368;

}



input[type="range"]{

    width:120px;

}



#canvas{

    display:block;

    background:white;

    touch-action:none;

}



#status{

    position:absolute;

    top:95px;

    left:10px;

    color:#555;

    background:white;

    padding:5px 10px;

    border-radius:10px;

}



</style>


</head>


<body>


<div id="toolbar">


<input 
type="color"
id="color"
value="#000000"
>



<input
type="range"
id="size"
min="1"
max="40"
value="5"
>



<button id="eraser">
지우개
</button>


<button id="undo">
↶ 이전
</button>


<button id="redo">
↷ 이후
</button>


<button id="clear">
전체 삭제
</button>



</div>



<p id="status">
연결 중...
</p>



<canvas id="canvas"></canvas>





<script>


// =======================
// WebSocket
// =======================


const socket =
new WebSocket(
"wss://tettris-rkjv.onrender.com"
);



socket.onopen=()=>{

status.innerText="연결 완료";

};



socket.onerror=()=>{

status.innerText="서버 오류";

};




// =======================
// Canvas 설정
// =======================


const canvas=
document.getElementById("canvas");


const ctx=
canvas.getContext("2d");




function resize(){


canvas.width=
window.innerWidth;


canvas.height=
window.innerHeight-
90;


}


resize();


window.onresize=resize;






let drawing=false;


let color="#000";


let size=5;


let erase=false;



let startX;
let startY;




// 내 작업 저장

let history=[];


let redoStack=[];




let currentStroke=[];






// =======================
// 입력 위치
// =======================


function getPos(e){


let rect=
canvas.getBoundingClientRect();



if(e.touches){


return {

x:e.touches[0].clientX-rect.left,

y:e.touches[0].clientY-rect.top

};


}


return {

x:e.clientX-rect.left,

y:e.clientY-rect.top

};


}







// =======================
// 시작
// =======================



function startDraw(e){


e.preventDefault();


drawing=true;



let pos=getPos(e);



startX=pos.x;

startY=pos.y;



currentStroke=[];



}




// =======================
// 이동
// =======================



function moveDraw(e){


if(!drawing)

return;


e.preventDefault();



let pos=getPos(e);



let data={


x1:startX,

y1:startY,

x2:pos.x,

y2:pos.y,


color:
erase?
"#ffffff":
color,


size:size


};



drawLine(data);



currentStroke.push(data);



send(data);



startX=pos.x;

startY=pos.y;


}






function endDraw(){


if(!drawing)

return;



drawing=false;



if(currentStroke.length){

history.push(currentStroke);

redoStack=[];

}


}








canvas.onmousedown=startDraw;

canvas.onmousemove=moveDraw;

canvas.onmouseup=endDraw;


canvas.ontouchstart=startDraw;

canvas.ontouchmove=moveDraw;

canvas.ontouchend=endDraw;






// =======================
// 그리기
// =======================


function drawLine(data){


ctx.strokeStyle=data.color;


ctx.lineWidth=data.size;


ctx.lineCap="round";



ctx.beginPath();


ctx.moveTo(
data.x1,
data.y1
);


ctx.lineTo(
data.x2,
data.y2
);


ctx.stroke();


}







function send(data){


if(socket.readyState===1){


socket.send(
JSON.stringify({

type:"draw",

data:data

})
);


}

}





// =======================
// 상대 그림
// =======================


socket.onmessage=e=>{


let msg=
JSON.parse(e.data);



if(msg.type==="draw"){


drawLine(
msg.data
);


}



};







// =======================
// 도구
// =======================


color.onchange=e=>{

color=e.target.value;

erase=false;

};



size.oninput=e=>{

size=e.target.value;

};





eraser.onclick=()=>{


erase=!erase;


};








// =======================
// Undo
// =======================


undo.onclick=()=>{


if(history.length===0)

return;



let last=
history.pop();


redoStack.push(last);



redraw();


};






redo.onclick=()=>{


if(redoStack.length===0)

return;



let data=
redoStack.pop();


history.push(data);


data.forEach(drawLine);


};








function redraw(){


ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);



history.forEach(stroke=>{


stroke.forEach(drawLine);


});


}







clear.onclick=()=>{


ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);



history=[];


redoStack=[];



socket.send(JSON.stringify({

type:"clear"

}));



};




</script>


</body>

</html>
